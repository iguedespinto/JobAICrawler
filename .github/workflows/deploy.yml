name: CI / Deploy to Heroku

# Run tests on every push and PR. Deploy to Heroku only when main passes.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest -q

  deploy:
    needs: test
    # Only deploy on a push to main (not on PRs).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Heroku rejects shallow pushes, so fetch the full history.
          fetch-depth: 0
      - name: Push to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          git push --force \
            "https://heroku:${HEROKU_API_KEY}@git.heroku.com/jobaicrawler-igp.git" \
            HEAD:refs/heads/main
