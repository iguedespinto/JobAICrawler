name: Deploy to Heroku

# Deploys to Heroku on every push to main (e.g. when a PR is merged).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Heroku rejects shallow pushes, so fetch the full history.
          fetch-depth: 0
      - name: Push to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          git push --force \
            "https://heroku:${HEROKU_API_KEY}@git.heroku.com/jobaicrawler-igp.git" \
            HEAD:refs/heads/main
