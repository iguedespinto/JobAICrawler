{# Shared shell. Every page extends this: one nav, one stylesheet, one voice.
   Blocks — title (browser tab), eyebrow/page_title/lede (the page head),
   head (per-page <style>), content, scripts. #}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Job AI Crawler{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=IBM+Plex+Mono:wght@400;500;600&family=Public+Sans:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
    {# In-place navigation: enhances every content form and link so an action
       swaps the page without a full reload or a lost scroll position. Loaded
       once, outside the swapped region, so it is never re-run. #}
    <script defer src="{{ url_for('static', filename='js/nav.js') }}"></script>
    {% block head %}{% endblock %}
  </head>
  <body>
    {# Toasts live outside the swapped region, and ahead of it so the script that
       fills them always finds this: an in-place navigation must not cut a toast
       short or lose the element that holds it. #}
    <div id="toasts" class="toasts" aria-live="polite"></div>

    <div class="shell">
      <nav class="rail" aria-label="Sections">
        <a class="rail__mark" href="{{ url_for('jobs.list_jobs') }}">
          Job AI <span>Crawler</span>
        </a>

        {# aria-current does double duty: it styles the active link and tells a
           screen reader where it is. Matched on endpoint, not on a passed-in
           flag, so a new page can never forget to light its own tab. #}
        {% set nav = [
          ('jobs.list_jobs', 'Roles'),
          ('dashboard.view_dashboard', 'Skills'),
          ('import_jobs.import_form', 'Import'),
          ('keywords.manage_keywords', 'Groups'),
          ('targets.manage_targets', 'Targets'),
          ('profile.get_profile', 'Profile'),
        ] %}
        <div class="rail__nav">
          {% for endpoint, label in nav %}
            <a class="rail__link" href="{{ url_for(endpoint) }}"
               {% if request.endpoint == endpoint %}aria-current="page"{% endif %}>{{ label }}</a>
          {% endfor %}
        </div>

        <div class="rail__foot">
          Roles are gathered<br />outside and imported here.
        </div>
      </nav>

      <main class="main">
        <div class="main__inner">
          {% block page_head %}
            <header class="page-head">
              {% block eyebrow %}{% endblock %}
              <h1 class="page-title">{% block page_title %}{% endblock %}</h1>
              {% block lede %}{% endblock %}
            </header>
          {% endblock %}

          {% with messages = get_flashed_messages() %}
            {% if messages %}
              {% for message in messages %}
                <div class="flash">{{ message }}</div>
              {% endfor %}
            {% endif %}
          {% endwith %}

          {# The banner stays, but an in-place action leaves you where you were —
             often far below it — so every message is mirrored as a toast you
             can't miss. This sits inside the swapped region so a swapped-in flash
             raises one too; the toasts themselves are anchored outside it. #}
          <script>
            (function () {
              var host = document.getElementById("toasts");
              if (!host) return;

              function dismiss(toast) {
                if (!toast.parentNode) return;
                toast.classList.remove("toast--in");
                setTimeout(function () {
                  if (toast.parentNode) toast.remove();
                }, 250);
              }

              var flashes = document.querySelectorAll(".main__inner .flash");
              for (var i = 0; i < flashes.length; i++) {
                var flash = flashes[i];
                // A swap re-runs this script; never raise the same banner twice.
                if (flash.dataset.toasted) continue;
                flash.dataset.toasted = "1";

                (function (text, index) {
                  var toast = document.createElement("div");
                  toast.className = "toast";
                  toast.textContent = text;
                  toast.title = "Dismiss";
                  toast.addEventListener("click", function () { dismiss(toast); });
                  host.appendChild(toast);
                  // Next frame, so the transition has a start state to move from.
                  requestAnimationFrame(function () { toast.classList.add("toast--in"); });
                  // Stagger, so several messages don't vanish in one blink.
                  setTimeout(function () { dismiss(toast); }, 6000 + index * 500);
                })(flash.textContent.trim(), i);
              }
            })();
          </script>

          {% block content %}{% endblock %}

          {# Inside the swapped region on purpose: an in-place navigation carries
             the destination page's scripts with its content and re-runs them, so
             each page's script binds to the content it was rendered with. #}
          {% block scripts %}{% endblock %}
        </div>
      </main>
    </div>
  </body>
</html>
