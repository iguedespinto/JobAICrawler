<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Profile</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; }
      label { display: block; margin-top: 1rem; }
      textarea { width: 100%; height: 120px; }
      input[type="text"] { width: 100%; }
      .hint { color: #666; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <div style="margin-bottom: 1rem;">
      <a href="{{ url_for('jobs.list_jobs') }}" style="margin-right: 1rem;">Jobs</a>
      <a href="{{ url_for('dashboard.view_dashboard') }}" style="margin-right: 1rem;">Dashboard</a>
      <a href="{{ url_for('import_jobs.import_form') }}">Import Opportunities</a>
    </div>
    <h1>Your Profile</h1>
    <form method="post" action="{{ url_for('profile.update_profile') }}">
      <label>
        About you
        <textarea name="about_you">{{ profile.get('about_you', '') }}</textarea>
      </label>

      <label>
        Skills (comma separated)
        <input type="text" name="skills" value="{{ profile.get('skills', []) | join(', ') }}" />
      </label>

      <label>
        Preferred locations (comma separated)
        <input type="text" name="preferred_locations" value="{{ profile.get('preferred_locations', []) | join(', ') }}" />
      </label>

      <label>
        Remote preference
        <input type="text" name="remote_preference" value="{{ profile.get('remote_preference', '') }}" />
        <div class="hint">Example: remote | hybrid | onsite</div>
      </label>

      <label>
        Target roles (comma separated)
        <input type="text" name="target_roles" value="{{ profile.get('target_roles', []) | join(', ') }}" />
      </label>

      <label>
        Target seniority
        <input type="text" name="target_seniority" value="{{ profile.get('target_seniority', '') }}" />
      </label>

      <button type="submit">Save Profile</button>
    </form>

    <div style="margin-top: 2rem;">
      <h2>Import Opportunities</h2>
      <p>Opportunities are prepared externally and brought in as a JSON file.</p>
      <a href="{{ url_for('import_jobs.import_form') }}">Go to import</a>
    </div>
  </body>
</html>
